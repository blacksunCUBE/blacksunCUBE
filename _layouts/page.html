---
layout: default
---
<section class="section">
  <div class="container">
    <header class="hero" style="padding-block: var(--sp-7) var(--sp-5);">
      {% if page.eyebrow %}<span class="hero__eyebrow">{{ page.eyebrow }}</span>{% endif %}
      <h1 class="hero__title">{{ page.title }}</h1>
      {% if page.lead %}<p class="hero__lead">{{ page.lead }}</p>{% endif %}
    </header>

    <div class="prose">
      {{ content }}
    </div>
  </div>
</section>
